name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Sync development dependencies
        run: uv sync --group dev
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Lint Python
        run: uv run ruff check .
      - name: Check Python formatting
        run: uv run ruff format --check .
      - name: Build extension for type-checking
        run: uv run maturin develop
      - name: Type-check examples and tests
        run: uv run mypy tests examples

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install Rust MSRV
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - name: Verify the declared MSRV builds
        run: cargo check --all-targets

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: [lint, msrv]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Sync development dependencies
        run: uv sync --group dev
      - name: Run Rust tests
        run: uv run cargo test --all-targets
      - name: Build extension in the uv environment
        run: uv run maturin develop
      - name: Run Python tests
        run: uv run pytest

  examples:
    name: examples (ubuntu, py3.13)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Sync development dependencies
        run: uv sync --group dev
      - name: Build extension in the uv environment
        run: uv run maturin develop
      - name: Run example scripts
        run: |
          uv run python examples/simple.py
          uv run python examples/list_cpu_data.py
          uv run python examples/list_resources.py
          uv run python examples/sysinfo.py
          uv run python examples/process_control.py

  coverage:
    name: coverage (ubuntu, py3.13)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Sync development dependencies
        run: uv sync --group dev
      - name: Build extension in the uv environment
        run: uv run maturin develop
      - name: Collect Python coverage
        run: uv run pytest --cov=pysysinfo --cov-report=term-missing --cov-report=xml:python-coverage.xml
      - name: Collect Rust coverage
        run: uv run cargo llvm-cov --all-targets --lcov --output-path rust-coverage.lcov
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            python-coverage.xml
            rust-coverage.lcov

  package-smoke:
    name: package smoke (ubuntu, py3.13)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Sync development dependencies
        run: uv sync --group dev
      - name: Build wheel and sdist
        run: uv run maturin build --release --sdist --find-interpreter --out dist
      - name: Create isolated wheel test environment
        run: uv venv .venv-wheel-smoke --python 3.13
      - name: Install wheel
        run: uv pip install --python .venv-wheel-smoke/bin/python dist/*.whl
      - name: Smoke-test installed wheel
        run: ./.venv-wheel-smoke/bin/python -c "from pysysinfo import Sysinfo; system = Sysinfo(); print(system.host_name)"
      - name: Create isolated sdist test environment
        run: uv venv .venv-sdist-smoke --python 3.13
      - name: Install sdist
        run: uv pip install --python .venv-sdist-smoke/bin/python dist/*.tar.gz
      - name: Smoke-test installed sdist
        run: ./.venv-sdist-smoke/bin/python -c "from pysysinfo import Sysinfo; system = Sysinfo(); print(system.host_name)"

  linux-wheels:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, examples, package-smoke]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist

  windows-wheels:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, examples, package-smoke]
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  macos-wheels:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, examples, package-smoke]
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist

  sdist:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, examples, package-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux-wheels, windows-wheels, macos-wheels, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*
